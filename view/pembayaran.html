<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembayaran Berhasil - Aksarise</title>
    <link rel="stylesheet" href="../src/output.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body class="min-h-screen bg-slate-50 antialiased flex items-center justify-center py-10">

    <div class="mx-auto w-full max-w-md px-4">
      <div class="rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-xl shadow-slate-200/50">
        
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-emerald-50 text-emerald-500 ring-8 ring-emerald-50">
          <i data-feather="check-circle" class="h-10 w-10" stroke-width="2.5"></i>
        </div>

        <h1 class="text-2xl font-black tracking-tight text-slate-900 mb-2">
          Pembayaran Berhasil!
        </h1>
        <p class="text-sm text-slate-500 px-2 leading-relaxed">
          Terima kasih! Pembayaranmu telah kami terima. Aksarise sedang menyiapkan buku pesananmu untuk segera dikirim.
        </p>

        <div class="my-6 border-t-2 border-dashed border-slate-100 relative">
          <div class="absolute -left-11 -top-2.5 h-5 w-5 rounded-full bg-slate-50 border-r border-slate-200"></div>
          <div class="absolute -right-11 -top-2.5 h-5 w-5 rounded-full bg-slate-50 border-l border-slate-200"></div>
        </div>

        <div class="rounded-2xl bg-slate-50 p-4 text-left space-y-3 mb-8">
          <div class="flex justify-between items-center text-xs">
            <span class="text-slate-400 font-medium">ID Transaksi</span>
            <span class="font-mono font-bold text-slate-700">#AKS-892410</span>
          </div>
          <div class="flex justify-between items-center text-xs">
            <span class="text-slate-400 font-medium">Metode Pembayaran</span>
            <span class="font-semibold text-slate-700">E-Wallet (QRIS)</span>
          </div>
          <div class="flex justify-between items-center text-xs border-t border-slate-200 pt-2.5">
            <span class="text-slate-400 font-medium">Total Nominal</span>
            <span class="text-sm font-extrabold text-[#112D4E]">Rp 147.000</span>
          </div>
        </div>

        <div class="flex flex-col gap-3">
          <a
            href="home.html"
            class="flex items-center justify-center gap-2 rounded-xl bg-[#112D4E] py-3 text-sm font-bold text-white transition shadow-lg shadow-indigo-600/10 hover:bg-[#0F4C75] active:scale-[0.98]"
          >
            <i data-feather="home" class="h-4 w-4"></i> Kembali ke Beranda
          </a>
          
          <a
            href="riwayat.html" 
            class="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white py-3 text-sm font-semibold text-slate-600 transition hover:bg-slate-50 hover:text-slate-800"
          >
            <i data-feather="file-text" class="h-4 w-4"></i> Cek Status Pesanan
          </a>
        </div>

      </div>
    </div>
    
    <script>
      feather.replace();
    </script>
  </body>
</html>
