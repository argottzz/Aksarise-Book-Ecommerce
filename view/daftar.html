<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar</title>
    <link rel="stylesheet" href="../src/output.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>

  <body class="min-h-screen flex flex-col bg-white">
    <main class="flex flex-1 items-center justify-center">
      <div
        class="w-full max-w-7xl mx-auto grid md:grid-cols-2 items-center px-6 py-12 gap-10"
      >
        <div class="text-[#112D4E]">
          <!-- TEXT -->
          <div class="mb-10">
            <a
              href="login.html"
              class="flex items-center gap-2 text-[#112D4E] mb-2 hover:opacity-80 transition"
            >
              <i data-feather="arrow-left"></i>

              <span class="font-semibold text-2xl">Daftar</span>
            </a>

            <p class="text-base text-[#112D4E]">Mari buat akunmu!</p>
          </div>

          <!-- FORM -->
          <form
            action="login.html"
            method="POST"
            class="bg-gray-200 rounded-3xl p-8 max-w-md shadow-xl"
          >
            <!-- EMAIL -->
            <div class="relative mb-4">
              <i
                data-feather="mail"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#0F4C75] w-5 h-5"
              ></i>

              <input
                type="email"
                name="email"
                required
                autocomplete="email"
                placeholder="Email..."
                class="w-full pl-12 pr-4 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#112D4E] focus:ring-2 focus:ring-[#0F4C75]"
              />
            </div>

            <!-- PASSWORD -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#0F4C75] w-5 h-5"
              ></i>

              <input
                type="password"
                id="password"
                required
                placeholder="Password..."
                class="w-full pl-12 pr-12 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#0F4C75]"
              />

              <i
                data-feather="eye"
                onclick="password('password', this)"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#0F4C75] w-5 h-5"
              ></i>
            </div>

            <!-- KONFIRMASI PASSWORD -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#0F4C75] w-5 h-5"
              ></i>

              <input
                type="password"
                id="cPassword"
                required
                placeholder="Konfirmasi Password..."
                class="w-full pl-12 pr-12 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#0F4C75]"
              />

              <i
                data-feather="eye"
                onclick="confirmPassword('cPassword', this)"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#0F4C75] w-5 h-5"
              ></i>
            </div>

            <!-- OPSI LOGIN -->
            <div class="text-right text-sm mb-6">
              <a href="login.html" class="hover:underline">
                Sudah punya akun?
                <span class="text-blue-500">Login</span>
              </a>
            </div>

            <a 
            type="submit"
            href="login.html"
            class="block w-full text-center text-white bg-[#112D4E] hover:bg-[#0F4C75] py-3.5 rounded-xl font-bold transition-colors duration-200 shadow-md shadow-blue-900/10"
          >
            Daftar
          </a>
          </form>

          <!-- OPSI LOGIN LAIN -->
          <div class="mt-10 max-w-md">
            <div class="flex items-center gap-4 text-[#112D4E] text-sm">
              <div class="flex-1 h-px bg-[#112D4E]"></div>

              <span>Or continue with</span>

              <div class="flex-1 h-px bg-[#112D4E]"></div>
            </div>

            <div class="flex gap-4 mt-6">
              <!-- GOOGLE -->
              <button
                type="button"
                class="flex items-center justify-center gap-2 bg-white text-[#112D4E] px-4 py-3 rounded-full w-full shadow hover:-translate-y-1 hover:shadow-xl transition duration-300"
              >
                <img src="../asset/google.jpg" class="w-7" alt="Google" />

                Google
              </button>

              <!-- WHATSAPP -->
              <button
                type="button"
                class="flex items-center justify-center gap-2 bg-white text-[#112D4E] px-4 py-3 rounded-full w-full shadow hover:-translate-y-1 hover:shadow-xl transition duration-300"
              >
                <img
                  src="../asset/whatsapp.jpg"
                  class="w-5 rounded-sm"
                  alt="WhatsApp"
                />

                WhatsApp
              </button>
            </div>
          </div>
        </div>

        <!-- FOTO -->
        <div
          class="hidden md:flex justify-center items-center border-l-2 border-[#112D4E] pl-12"
        >
          <img
            src="../asset/daftar.png"
            class="max-w-md w-full"
            alt="Register Illustration"
          />
        </div>
      </div>
    </main>

    <script>
      feather.replace();
    </script>
    <script src="../script/auth.js"></script>
  </body>
</html>
